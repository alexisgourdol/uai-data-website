<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>uai data — Freelance Data Analyst</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon_io/favicon-16x16.png">
    <link rel="manifest" href="/assets/images/favicon_io/site.webmanifest">


    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #FAF9F6;
            --surface: #F2F1ED;
            --surface-2: #F5F4F0;
            --border: #E5E4DF;
            --text: #1C1C1A;
            --text-muted: #6B6A66;
            --accent: #0D9488;
            --font-head: "DM Sans", sans-serif;
            --font-mono: "JetBrains Mono", monospace;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-head);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        #root {
            min-height: 100vh;
        }

        /* Typography reset */
        h1,
        h2,
        h3,
        h4 {
            font-family: var(--font-head);
        }

        /* Responsive grid adjustments */
        @media (max-width: 900px) {
            .hero-grid {
                grid-template-columns: 1fr !important;
            }

            .hero-visual {
                display: none !important;
            }

            .services-grid,
            .portfolio-grid {
                grid-template-columns: 1fr !important;
            }

            .about-grid {
                grid-template-columns: 1fr !important;
                gap: 3rem !important;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr) !important;
            }

            .blog-grid {
                grid-template-columns: 1fr !important;
            }

            .projects-grid {
                grid-template-columns: 1fr !important;
            }
        }

        @media (max-width: 640px) {
            .nav-links {
                display: none !important;
            }

            .nav-cta {
                display: none !important;
            }

            .nav-burger {
                display: flex !important;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr) !important;
            }

            .hero-eyebrow-full {
                display: none !important;
            }

            .hero-eyebrow-short {
                display: inline !important;
            }
        }

        @media (min-width: 641px) {
            .nav-burger {
                display: none !important;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
        integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
        crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
        integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
        crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
        integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
        crossorigin="anonymous"></script>

    <script src="translations.js"></script>
    <script type="text/babel" src="App.jsx"></script>
</body>

</html>
