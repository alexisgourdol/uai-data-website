<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>uai data — Freelance Data Analyst</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon_io/favicon-16x16.png">
    <link rel="manifest" href="/assets/images/favicon_io/site.webmanifest">

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* ─── Light Mode ─────────────────────────────────────────────── */
        :root {
            --bg: #FAF9F6;
            --surface: #F2F1ED;
            --surface-2: #F5F4F0;
            --border: #E5E4DF;
            --text: #1C1C1A;
            --text-muted: #6B6A66;
            --text-on-accent: #FFFFFF;
            --accent: #F59E0B;
            --accent-hover: #D97706;
            --accent-subtle: rgba(245, 158, 11, 0.10);
            --stats-bg: #1C1C1A;
            --project-1: #F59E0B;
            --project-2: #6366F1;
            --project-3: #0D9488;
            --project-4: #EC4899;
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.08);
            --shadow-card-dark: 0 12px 40px rgba(0, 0, 0, 0.20);
            --shadow-cta: 0 4px 20px rgba(245, 158, 11, 0.30);
            --shadow-cta-hover: 0 8px 28px rgba(245, 158, 11, 0.40);
            --font-head: "DM Sans", sans-serif;
            --font-body: "DM Sans", sans-serif;
            --font-mono: "JetBrains Mono", monospace;
            --text-xs: 0.72rem;
            --text-sm: 0.8rem;
            --text-base: 0.875rem;
            --text-md: 1rem;
            --text-lg: 1.1rem;
            --text-xl: 1.15rem;
            --text-2xl: clamp(1.75rem, 3vw, 2.5rem);
            --text-3xl: clamp(2rem, 3.5vw, 2.75rem);
            --text-4xl: clamp(2.2rem, 4vw, 3.5rem);
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-btn: 10px;
            --radius-card: 14px;
            --radius-lg: 20px;
            --radius-pill: 100px;
            --space-1: 0.25rem;
            --space-2: 0.5rem;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-5: 1.25rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
            --space-10: 2.5rem;
            --space-12: 3rem;
            --space-14: 3.5rem;
            --space-28: 7rem;
            --max-width: 1120px;
            --nav-height: 64px;
            --section-pad-v: var(--space-28);
            --section-pad-h: clamp(1.5rem, 5vw, 3rem);
        }

        /* ─── Dark Mode ──────────────────────────────────────────────── */
        [data-theme="dark"] {
            --bg: #141412;
            --surface: #1E1D1B;
            --surface-2: #191817;
            --border: #2E2D2A;
            --text: #F0EFE8;
            --text-muted: #8A8882;
            --text-on-accent: #FFFFFF;
            --accent: #FBBF24;
            --accent-hover: #F59E0B;
            --accent-subtle: rgba(251, 191, 36, 0.12);
            --stats-bg: #0D0D0B;
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.30);
            --shadow-card-dark: 0 12px 40px rgba(0, 0, 0, 0.50);
            --shadow-cta: 0 4px 20px rgba(245, 158, 11, 0.35);
            --shadow-cta-hover: 0 8px 28px rgba(245, 158, 11, 0.45);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-head);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        #root {
            min-height: 100vh;
        }

        h1,
        h2,
        h3,
        h4 {
            font-family: var(--font-head);
        }

        /* ─── Responsive ─────────────────────────────────────────────── */
        @media (max-width: 900px) {
            .hero-grid {
                grid-template-columns: 1fr !important;
            }

            .hero-visual {
                display: none !important;
            }

            .services-grid,
            .portfolio-grid {
                grid-template-columns: 1fr !important;
            }

            .about-grid {
                grid-template-columns: 1fr !important;
                gap: 3rem !important;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr) !important;
            }

            .blog-grid {
                grid-template-columns: 1fr !important;
            }

            .projects-grid {
                grid-template-columns: 1fr !important;
            }
        }

        @media (max-width: 640px) {
            .nav-links {
                display: none !important;
            }

            .nav-cta {
                display: none !important;
            }

            .nav-burger {
                display: flex !important;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr) !important;
            }

            .hero-eyebrow-full {
                display: none !important;
            }

            .hero-eyebrow-short {
                display: inline !important;
            }
        }

        @media (min-width: 641px) {
            .nav-burger {
                display: none !important;
            }
        }

        /* ─── Scrollbar ──────────────────────────────────────────────── */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
        integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
        crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
        integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
        crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
        integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
        crossorigin="anonymous"></script>

    <script src="translations.js"></script>
    <script type="text/babel" src="App.jsx"></script>
</body>

</html>
